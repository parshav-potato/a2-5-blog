<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b4252"/>
      <stop offset="100%" stop-color="#434c5e"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="800" height="300" fill="url(#bg)" rx="6"/>

  <!-- top bar (editor chrome) -->
  <rect width="800" height="36" fill="#2e3440" rx="6"/>
  <rect y="30" width="800" height="6" fill="#2e3440"/>

  <!-- window dots -->
  <circle cx="20" cy="18" r="5" fill="#bf616a" opacity="0.8"/>
  <circle cx="38" cy="18" r="5" fill="#ebcb8b" opacity="0.8"/>
  <circle cx="56" cy="18" r="5" fill="#a3be8c" opacity="0.8"/>

  <!-- file label -->
  <text x="400" y="22" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#7b88a1">demo.md</text>

  <!-- line numbers -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#4c566a">
    <text x="20" y="66">1</text>
    <text x="20" y="86">2</text>
    <text x="20" y="106">3</text>
    <text x="20" y="126">4</text>
    <text x="20" y="146">5</text>
    <text x="20" y="166">6</text>
    <text x="20" y="186">7</text>
    <text x="20" y="206">8</text>
    <text x="20" y="226">9</text>
    <text x="20" y="246">10</text>
    <text x="20" y="266">11</text>
  </g>

  <!-- code lines -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12">
    <text x="48" y="66" fill="#88c0d0">---</text>
    <text x="48" y="86"><tspan fill="#81a1c1">title</tspan><tspan fill="#d8dee9">: </tspan><tspan fill="#a3be8c">"A2/5 Posting Guide"</tspan></text>
    <text x="48" y="106"><tspan fill="#81a1c1">date</tspan><tspan fill="#d8dee9">: </tspan><tspan fill="#a3be8c">"2026-05-13"</tspan></text>
    <text x="48" y="126"><tspan fill="#81a1c1">tags</tspan><tspan fill="#d8dee9">: </tspan><tspan fill="#ebcb8b">["demo", "guide"]</tspan></text>
    <text x="48" y="146" fill="#88c0d0">---</text>
    <text x="48" y="166" fill="#d8dee9"> </text>
    <text x="48" y="186"><tspan fill="#88c0d0">## </tspan><tspan fill="#eceff4">Text formatting</tspan></text>
    <text x="48" y="206" fill="#d8dee9"> </text>
    <text x="48" y="226"><tspan fill="#d8dee9">Regular paragraphs flow naturally. </tspan><tspan fill="#81a1c1" font-weight="bold">**bold**</tspan></text>
    <text x="48" y="246"><tspan fill="#d8dee9">or </tspan><tspan fill="#81a1c1">*italic*</tspan><tspan fill="#d8dee9"> or inline </tspan><tspan fill="#a3be8c">`code`</tspan><tspan fill="#d8dee9">.</tspan></text>
    <text x="48" y="266" fill="#4c566a">~</text>
  </g>
</svg>
